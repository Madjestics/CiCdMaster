server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/cicd_master}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      acks: all
      retries: 3
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP:cicd-master-service}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.use.type.headers: false

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  executor-events:
    transport: ${EXECUTOR_EVENTS_TRANSPORT:kafka}
    opensearch:
      enabled: ${OPENSEARCH_LOGS_ENABLED:true}
      endpoint: ${OPENSEARCH_ENDPOINT:http://localhost:9200}
      index: ${OPENSEARCH_EVENTS_INDEX:cicd-executor-events}
      batch-size: ${OPENSEARCH_EVENTS_BATCH_SIZE:200}
      poll-interval-ms: ${OPENSEARCH_EVENTS_POLL_INTERVAL_MS:1000}
      startup-lookback-seconds: ${OPENSEARCH_EVENTS_STARTUP_LOOKBACK_SECONDS:10}
      max-pages-per-poll: ${OPENSEARCH_EVENTS_MAX_PAGES_PER_POLL:10}
      history-fetch-size: ${OPENSEARCH_HISTORY_FETCH_SIZE:500}
      history-max-pages: ${OPENSEARCH_HISTORY_MAX_PAGES:10}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174}
  kafka:
    topics:
      executor-commands: ${KAFKA_TOPIC_EXECUTOR_COMMANDS:cicd.executor.commands}
      executor-events: ${KAFKA_TOPIC_EXECUTOR_EVENTS:cicd.executor.events}
    mock-executor:
      enabled: ${KAFKA_MOCK_EXECUTOR_ENABLED:false}
      queue-delay-ms: ${KAFKA_MOCK_QUEUE_DELAY_MS:350}
      run-delay-ms: ${KAFKA_MOCK_RUN_DELAY_MS:1000}
      log-chunk-delay-ms: ${KAFKA_MOCK_LOG_CHUNK_DELAY_MS:650}
