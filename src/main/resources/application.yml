server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/cicd_master}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      acks: all
      retries: 3
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP:cicd-master-service}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.use.type.headers: false

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174}
  kafka:
    topics:
      executor-commands: ${KAFKA_TOPIC_EXECUTOR_COMMANDS:cicd.executor.commands}
      executor-events: ${KAFKA_TOPIC_EXECUTOR_EVENTS:cicd.executor.events}
    mock-executor:
      enabled: ${KAFKA_MOCK_EXECUTOR_ENABLED:true}
      queue-delay-ms: ${KAFKA_MOCK_QUEUE_DELAY_MS:350}
      run-delay-ms: ${KAFKA_MOCK_RUN_DELAY_MS:1000}
      log-chunk-delay-ms: ${KAFKA_MOCK_LOG_CHUNK_DELAY_MS:650}
